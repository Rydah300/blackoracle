<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Black Oracle Shop</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        /* Same CSS as index.html */
        :root { ... } /* Paste CSS from index.html here */
    </style>
</head>
<body>
    <div class="container">
        <h1>OPERATIVE REGISTRATION</h1>
        <form id="regForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="user" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="pass" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="pass2" required>
            </div>
            <div class="form-group">
                <label>Country</label>
                <input type="text" id="country" required>
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" required>
            </div>
            <div class="form-group">
                <label>Telegram @username</label>
                <input type="text" id="telegram" placeholder="@your_handle" required>
            </div>
            <div class="cf-turnstile" data-sitekey="YOUR_TURNSTILE_SITEKEY"></div>
            <button type="submit" class="btn">ENLIST NOW</button>
        </form>
        <div style="margin-top: 20px;">
            <a href="index.html" style="color:var(--red); text-decoration:none;">← BACK TO LOGIN</a>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (document.getElementById('pass').value !== document.getElementById('pass2').value) {
                alert("Passwords do not match!");
                return;
            }
            // In real implementation: send data to backend, trigger email verification
            alert("Verification code sent to your email. Check inbox!");
            window.location.href = "verify.html";
        });
    </script>
</body>
</html>
